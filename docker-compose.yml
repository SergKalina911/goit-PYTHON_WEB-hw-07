version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: school-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: school
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "timezone=Europe/Kyiv"]

volumes:
  postgres_data:
